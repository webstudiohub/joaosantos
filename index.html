<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>João Santos — Links</title>
<meta property="og:title" content="João Santos — Sites, Automação & Gestão Digital">
<meta property="og:description" content="Fale comigo direto no WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --bg-alt:#141414;
    --paper:#f2f0ea;
    --blue:#3B7EFF;
    --blue-dim:#1a3a7a;
    --line:#232323;
    --muted:#7a7a76;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding-bottom:80px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:radial-gradient(circle at 50% 0%, rgba(59,126,255,0.08), transparent 50%);
    pointer-events:none;
    z-index:0;
  }
  .card{
    width:100%;
    max-width:420px;
    position:relative;
    z-index:1;
  }

  /* --- Banner --- */
  .banner{
    width:100%;
    height:190px;
    background:
      linear-gradient(180deg, rgba(10,10,10,0) 35%, var(--bg) 100%),
      url('banner.png') center/cover no-repeat,
      linear-gradient(135deg, #1a1a1a, #0a0a0a);
    position:relative;
  }

  /* --- Header --- */
  .header{ padding:0 24px; text-align:center; margin-top:-54px; }
  .avatar-wrap{
    position:relative;
    width:112px;
    height:112px;
    margin:0 auto 18px;
  }
  .avatar-glow{
    position:absolute;
    inset:-4px;
    border-radius:50%;
    background:var(--blue);
    filter:blur(10px);
    opacity:0.35;
  }
  .avatar{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background:linear-gradient(145deg, #1e1e1e, #0a0a0a);
    border:4px solid var(--bg);
    outline:1px solid var(--blue-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Archivo Black', sans-serif;
    font-size:28px;
    color:var(--blue);
    overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover; display:block;}


  .name-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
  }
  h1{
    font-family:'Archivo Black', sans-serif;
    font-size:26px;
    letter-spacing:-0.5px;
    text-transform:uppercase;
  }
  .verified{ flex-shrink:0; transform:translateY(1px); }

  .role{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--blue);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-top:6px;
  }
  .bio{
    color:var(--muted);
    font-size:14px;
    line-height:1.55;
    margin:14px auto 0;
    max-width:310px;
  }

  /* --- Main CTA --- */
  .cta-wrap{ padding:30px 24px 0; }
  .cta{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    padding:18px 20px;
    background:var(--bg-alt);
    border:1px solid var(--line);
    border-radius:18px;
    text-decoration:none;
    color:var(--paper);
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .cta:hover{
    transform:translateY(-3px);
    border-color:var(--blue);
    box-shadow:0 10px 30px -8px rgba(59,126,255,.3);
  }
  .cta:active{ transform:translateY(-1px); }

  .cta-icon{
    flex-shrink:0;
    width:50px; height:50px;
    border-radius:13px;
    background:#0a0a0a;
    border:1px solid var(--line);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cta-icon img{ width:100%; height:100%; object-fit:cover; }
  .cta-text{ flex:1; }
  .cta-title{ font-weight:700; font-size:17px; }
  .cta-sub{ font-family:'Inter', sans-serif; font-weight:500; font-size:13.5px; color:var(--muted); margin-top:4px; line-height:1.35; }
  .cta-arrow{
    color:var(--blue);
    font-size:20px;
    transition:transform .18s ease;
  }
  .cta:hover .cta-arrow{ transform:translateX(4px); }

  /* --- Coming soon row --- */
  .soon{
    margin:26px 24px 0;
    padding:16px 18px;
    border:1px dashed var(--line);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.2px;
  }
  .soon .dots span{
    display:inline-block;
    width:5px; height:5px;
    border-radius:50%;
    background:var(--line);
    margin-left:3px;
  }

  footer{
    text-align:center;
    margin-top:36px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--line);
  }
  footer span{ color:var(--muted); }
</style>
</head>
<body>

<div class="card">

  <div class="banner"></div>

  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <div class="avatar"><img src="500.png" alt="João Santos"></div>
    </div>

    <div class="name-row">
      <h1>João Santos</h1>
      <svg class="verified" width="20" height="20" viewBox="0 0 22 22" fill="none">
        <path d="M11 0L13.4 2.1L16.5 1.4L17.6 4.4L20.6 5.5L19.9 8.6L22 11L19.9 13.4L20.6 16.5L17.6 17.6L16.5 20.6L13.4 19.9L11 22L8.6 19.9L5.5 20.6L4.4 17.6L1.4 16.5L2.1 13.4L0 11L2.1 8.6L1.4 5.5L4.4 4.4L5.5 1.4L8.6 2.1L11 0Z" fill="#3B7EFF"/>
        <path d="M6.5 11.3L9.3 14L15.5 7.7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="role">Sites · Automação · Gestão Digital</div>
    <p class="bio">Sites, automação de chatbot, biosites, landing pages e gestão do Google Meu Negócio.</p>
  </div>

  <div class="cta-wrap">
    <a class="cta" href="https://wa.me/5522992286480" target="_blank" rel="noopener noreferrer">
      <div class="cta-icon"><img src="501.png" alt="WhatsApp"></div>
      <div class="cta-text">
        <div class="cta-title">WhatsApp</div>
        <div class="cta-sub">Entre em contato e garanta seu projeto</div>
      </div>
      <div class="cta-arrow">→</div>
    </a>
  </div>

  <div class="soon">
    mais links em breve
    <span class="dots"><span></span><span></span><span></span></span>
  </div>

  <footer>feito por <span>João Santos</span> · atualizado 2026</footer>
</div>

</body>
</html>
